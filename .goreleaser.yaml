version: 2

project_name: kubenv

before:
  hooks:
    - go test ./...

builds:
  - id: kubenv
    main: ./cmd/kubenv
    binary: kubenv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags: &ldflags
      - -s -w -X github.com/dexiotropic/kubenv/internal/version.version={{ .Version }} -X github.com/dexiotropic/kubenv/internal/version.commit={{ .Commit }} -X github.com/dexiotropic/kubenv/internal/version.date={{ .Date }}

  - id: kubectl-env
    main: ./cmd/kubectl-env
    binary: kubectl-env
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags: *ldflags

  - id: kubenv-argocd-cmp
    main: ./cmd/kubenv-argocd-cmp
    binary: kubenv-argocd-cmp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags: *ldflags

archives:
  - id: kubenv-archive
    ids:
      - kubenv
    name_template: "{{ .ProjectName }}_{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - src: docs/KUBENV.md
        dst: README.md
      - CHANGELOG.md
    format_overrides:
      - goos: windows
        formats:
          - zip
  - id: kubectl-env-archive
    ids:
      - kubectl-env
    name_template: "{{ .ProjectName }}_{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - src: docs/KUBECTL.md
        dst: README.md
      - CHANGELOG.md
    format_overrides:
      - goos: windows
        formats:
          - zip
  - id: kubenv-argocd-cmp-archive
    ids:
      - kubenv-argocd-cmp
    name_template: "{{ .ProjectName }}_{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - src: docs/ARGOCD.md
        dst: README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github-native

dockers_v2:
  - id: kubenv-argocd-cmp-versioned
    ids:
      - kubenv-argocd-cmp
    dockerfile: Dockerfile.argocd-cmp-versioned
    images:
      - ghcr.io/dexiotropic/kubenv-argocd-cmp
    tags:
      - "v{{ .Version }}"
    annotations:
      org.opencontainers.image.title: "kubenv Argo CD CMP"
      org.opencontainers.image.description: "Argo CD Config Management Plugin sidecar for kubenv manifest rendering."
      org.opencontainers.image.documentation: "https://github.com/dexiotropic/kubenv/blob/main/docs/ARGOCD.md"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.licenses: "Apache-2.0"
      org.opencontainers.image.version: "v{{ .Version }}"
    build_args:
      PLUGIN_VERSION: "v{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - packaging/argocd/plugin.yaml
  - id: kubenv-argocd-cmp-latest
    ids:
      - kubenv-argocd-cmp
    dockerfile: Dockerfile.argocd-cmp
    images:
      - ghcr.io/dexiotropic/kubenv-argocd-cmp
    tags:
      - latest
    annotations:
      org.opencontainers.image.title: "kubenv Argo CD CMP"
      org.opencontainers.image.description: "Argo CD Config Management Plugin sidecar for kubenv manifest rendering."
      org.opencontainers.image.documentation: "https://github.com/dexiotropic/kubenv/blob/main/docs/ARGOCD.md"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.licenses: "Apache-2.0"
      org.opencontainers.image.version: "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - packaging/argocd/plugin.yaml
