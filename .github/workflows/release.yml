name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate extra release assets
        env:
          TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          cp packaging/argocd/plugin.yaml "dist/kubenv-argocd-plugin.yaml"
          ./scripts/generate-argocd-plugin.sh "dist/kubenv-argocd-plugin-versioned.yaml" "$TAG"
          ./scripts/generate-homebrew-formula.sh "$TAG" "$VERSION" "$REPOSITORY" "dist/kubenv.rb"
          ./scripts/generate-krew-manifest.sh "$TAG" "$VERSION" "$REPOSITORY" "dist/env.yaml"

      - name: Upload extra release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*.rb dist/*.yaml)
          if ((${#assets[@]} > 0)); then
            gh release upload "$TAG" "${assets[@]}" --clobber
          fi

      - name: Update Homebrew tap
        if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap update"
            exit 0
          fi
          ./scripts/publish-homebrew-formula.sh \
            dist/kubenv.rb \
            kubenv \
            "$HOMEBREW_TAP_REPOSITORY" \
            "${HOMEBREW_TAP_BRANCH:-main}" \
            "github-actions[bot]" \
            "41898282+github-actions[bot]@users.noreply.github.com"
