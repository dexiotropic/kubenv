apiVersion: argoproj.io/v1alpha1
kind: ConfigManagementPlugin
metadata:
  name: kubenv
spec:
  generate:
    command:
      - sh
      - '-c'
    args:
      - >-
        find . -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.json' \) -print0 | xargs -0
        cat | kubenv-argocd-cmp
  parameters:
    static:
      - name: vars
        title: kubenv variables
        tooltip: Map of variables exposed to {{ env.NAME }} placeholders.
        collectionType: map
        map: {}
      - name: kubenv
        title: kubenv options
        tooltip: Plugin behavior settings such as shell-style placeholder rendering.
        collectionType: map
        map: {}
