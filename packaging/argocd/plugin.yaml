apiVersion: argoproj.io/v1alpha1
kind: ConfigManagementPlugin
metadata:
  name: kubenv
spec:
  version: 0.3.0
  generate:
    command:
      - sh
      - '-c'
    args:
      - >-
        find . -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 | xargs -0
        cat | kubenv-argocd-cmp
  parameters:
    static:
      - name: vars
        title: kubenv variables
        tooltip: Map of variables exposed to {{ env.NAME }} placeholders.
        collectionType: map
        map: {}
  discover:
    find:
      command:
        - sh
        - '-c'
        - find . -name '.kubenv.yaml' -o -name 'kubenv.yaml' | grep .
